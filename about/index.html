    <p align="center"><img src="https://gss3.bdstatic.com/-Po3dSag_xI4khGkpoWK1HF6hhy/baike/s%3D250/sign=c031fb02b3119313c343f8b555390c10/f2deb48f8c5494ee636d3ad92cf5e0fe98257ea6.jpg" alt="袁伟书赠奥巴马的“观海听涛”书法作品" style="float:right;width:121px;height:250px;">2009年11月18日，美国总统奥巴马到京访华。美国驻华大使看到由著名红色书法家袁伟将军题写的《金玉虎符》国礼后，邀请袁伟将军为美国总统奥巴马个人书写一幅书法作品。袁伟欣然接受，挥毫写下了“观海听涛”四个大字，他希望能通过这幅书法作品，让奥巴马领略中国书法艺术的奥妙，体会中华民族的宽广胸怀。<br><br><br><br><br><br></p>
